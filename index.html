<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

        <link rel="stylesheet" href="./assets/css/style.css" />
        <title>Social Slider</title>
    </head>

    <body id="body">
        <div class="slider-wrapper">
            <div class="carousel">
                <div class="card instagram" data-color="#E1306C">
                    <div class="icon"><i class="fab fa-instagram"></i></div>
                    <h1>Instagram</h1>
                </div>

                <div class="card youtube" data-color="#FF0000">
                    <div class="icon"><i class="fab fa-youtube"></i></div>
                    <h1>YouTube</h1>
                </div>

                <div class="card discord" data-color="#5865F2">
                    <div class="icon"><i class="fab fa-discord"></i></div>
                    <h1>Discord</h1>
                </div>

                <div class="card twitter" data-color="#141414">
                    <div class="icon"><i class="fab fa-twitter"></i></div>
                    <h1>X</h1>
                </div>
            </div>
        </div>

        <script src="./assets/js/main.js"></script>
    </body>
</html>
